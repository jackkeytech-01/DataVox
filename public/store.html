*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07192e;
color:white;
}

.store-container{
padding:15px;
}

/* HEADER */

.store-header{

background:linear-gradient(
90deg,
#007bff,
#00c6ff
);

padding:15px;

border-radius:12px;

display:flex;

flex-direction:column;

gap:15px;
}

.header-top{

display:flex;

align-items:center;

justify-content:space-between;
}

.header-top h2{
font-size:1.4rem;
}

.store-summary{

display:flex;

gap:15px;

flex-wrap:wrap;
}

.add-btn{

border:none;

background:#005eff;

color:white;

padding:12px;

border-radius:8px;

cursor:pointer;

font-weight:bold;
}

/* SEARCH PANE */
.search_pane {
	display: flex;
	position: fixed;
	top: 5%;
	width: auto;
	right: 20%;
	left: 20%;
	gap: 10px;
	background: rgb(0, 255, 255, 0.8);
	z-index: 9999;
	text-align: center;
	justify-content: center;
	border-radius: 10px;
	border: 1px solid black;
	font-size: 1.5em;
	padding: 0.5%;
}
.search_pane.hide {
	display: none;
}
.filterSearch {
	background: transparent;
	backdrop-filter: blur(100px);
	border: none;
	color: black;
	font-weight: bolder;
	outline: none;
	width: 60%;
	padding: 1%;
}
.ctrl_pane{
	display: flex;
	gap: 10px;
}
.btn_{
	border: none;
	display: flex;
	text-align: center;
	justify-content: center;
	background: transparent;
	padding: 1%;
}
.btn_.close {
	background: none;
	color: red;
	margin-left: 80%;
}
@media (max-width: 800px) {
	.btn_.close {
		margin-left: 20%;
	}
}
/* PRODUCT CARD */

.products{

margin-top:20px;

display:flex;

flex-direction:column;

gap:15px;
}

.product-card{

background:#10253f;

border-radius:12px;

padding:15px;

box-shadow:
0 4px 10px rgba(0,0,0,.2);
}

.product-name{

font-size:1.2rem;

font-weight:bold;

margin-bottom:15px;

color:#fff;
}

.info-row{

display:flex;

justify-content:space-between;

padding:6px 0;

border-bottom:
1px solid rgba(255,255,255,.05);

.info-row:last-child{
border:none;
}

.label{
color:#9db4cf;
}

.value{
font-weight:bold;
}

.alert{
color:#ff9800;
}

.card-actions{

display:flex;

gap:10px;

margin-top:15px;
}

.edit-btn{

flex:1;

background:#4caf50;

border:none;

padding:12px;

border-radius:8px;

color:white;

cursor:pointer;

.delete-btn{

flex:1;

background:#f44336;

border:none;

padding:12px;

border-radius:8px;

color:white;

cursor:pointer;

.main_panes {
	width: 100%;
	height: 100%;
}
.zero {
	display: flex;
	flex-direction: column;
	width: 100%;

	top: 40%;

	text-align: center;

.zero_txt {

.btn {

.btn:hover {

.sub_btn {

						//AT THE END SUMMING UP WITH VALUES TO BE AT THE TOP

<!--
Showing either products or running out panes when clicked
-->
<script type="text/javascript" defer>
	let products_btn = document.getElementById('products_btn');
	let runout_btn = document.getElementById('runout_btn');
function showProducts(opt) {
	if (opt) {
		product_body.style.display='block';
		products_btn.setAttribute('style', 'cursor: default; border: none; border-bottom: 2px solid lime;');
		runout_btn.setAttribute('style', 'cursor: pointer; border: none;');
		runOut_body.style.display='none';
		getStore();
	}
	else {
				runout_btn.setAttribute('style', 'cursor: default; border: none; border-bottom: 2px solid lime;');
		products_btn.setAttribute('style', 'cursor: pointer; border: none;');
		product_body.style.display='none';
		runOut_body.style.display='block';
		getStore();
	}
} 
showProducts(true);
</script>

<script type="text/javascript">
let filterWindow = document.getElementById('search_pane');

function showFilter(opt) {
	if (opt) {
		filterWindow.classList.remove('hide');
		loadNames();
	} else {
		filterWindow.classList.add('hide');
		getStore();
	}
}
	showFilter(false)



// Fixed Name loader 
async function loadNames() {
	let selector = document.getElementById('filterSearch');
	let optionString = '';
	
	selector.innerHTML = "<li class='loading-text'>Loading...</li>";
	
	try {
		const user = await fetch('/account/api/user');
		const data = await user.json();
		
		for (var i = 0; i < data.names.length; i++) {
			// Using <li> gives us 100% style control
			optionString += `
			<option value="${data.names[i]}">
				${data.names[i]}
			</option>
			`;
		}

<script type="text/javascript">
	let id_ = '';
//let form_ = document.getElementById('form_');

async function editProduct(id) {
	let name = document.getElementById('name_input');
	let id__ = document.getElementById('id_input');
	let qn = document.getElementById('qn_input');
	let unitPrice = document.getElementById('unitPrice_input');
	let unitFrom = document.getElementById('unitFrom_input');
	let runOut = document.getElementById('run_input');
	let sellPrice = document.getElementById('sellPrice_input');
	form_.setAttribute('action', `/account/store/edit/${id}`);
	try {
		const res = await fetch('/account/api/user');
		const data = await res.json();

		for (var i=0; i<data.store.length; i++) {
			if (id.toString()===data.store[i]._id.toString()) {
				displayForm(true);
				name.value = data.store[i].name;
				id__.value = data.store[i].id;
				qn.value = data.store[i].qn;
				unitPrice.value = data.store[i].unitPrice;
				unitFrom.value = data.store[i].unitFrom;
				runOut.value = data.store[i].running_out;
				sellPrice.value = data.store[i].sellingPrice;
				id_ = id;
			}
		}
		}
		catch (err) {
			console.log(err.message);
			flyMSG('err', 'Server Error Occurred. Please try again.')
		}
}



form_.addEventListener('submit', async (e)=>{
	e.preventDefault();
	let name = e.target.name.value.trim();
	let id__ = e.target.id.value.trim();
	let qn = Number(e.target.qn.value);
	let unitPrice = Number(e.target.unitPrice.value);
	let unitFrom = Number(e.target.unitFrom.value);
	let runOut = Number(e.target.runOut.value);
	let sellPrice = Number(e.target.sellPrice.value);
	//alert(`${name} ${qn} ${unitPrice} ${unitFrom} ${runOut} ${sellPrice}`);

	const res = await fetch(`/account/store/edit/${id_}`, {
		method: 'PUT',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({ name, id__, qn, unitPrice, unitFrom, runOut, sellPrice })
	});
	const data = await res.json();

	if (data.problem) {
		flyMSG('err', data.message);
	}
	else {
		flyMSG('', data.message);
		location.reload(true);
		form_.reset();
	}

});
</script>
