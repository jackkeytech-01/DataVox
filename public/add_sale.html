<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Sale</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
    padding-bottom:90px;
}

/* HEADER */

.top-bar{
    height:80px;
    background:#04295f;
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;
}

.top-bar h2{
    font-size:1.1rem;
    font-weight:600;
}

.icon-btn{
    background:none;
    border:none;
    color:white;
    font-size:1.3rem;
    cursor:pointer;
}

/* CONTENT */

.container{
    padding:20px;
}

/* FORM CARD */

.form-card{

    background:white;

    border-radius:15px;

    padding:20px;

    box-shadow:
    0 2px 10px rgba(0,0,0,.08);
}

/* INPUT GROUP */

.input-group{
    margin-bottom:20px;
}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

    color:#333;
}

.input-group input,
.input-group select{

    width:100%;

    padding:14px;

    border:1px solid #d8dce3;

    border-radius:10px;

    outline:none;

    font-size:1rem;

    background:#fff;
}

.input-group input:focus{

    border-color:#2563eb;
}

/* TIME INPUT */

.time-wrapper{

    position:relative;
}

.time-wrapper i{

    position:absolute;

    right:15px;

    top:50%;

    transform:translateY(-50%);

    color:#777;
}

/* BUTTON */

.save-btn{

    width:100%;

    border:none;

    background:#16a34a;

    color:white;

    padding:15px;

    border-radius:10px;

    font-size:1rem;

    font-weight:bold;

    cursor:pointer;

    margin-top:10px;

    transition:.3s;
}

.save-btn:hover{

    background:#12833b;
}

.save-btn i{
    margin-right:8px;
}

/* NAVIGATION */

.bottom-nav{

    position:fixed;

    bottom:0;
    left:0;

    width:100%;

    background:white;

    display:flex;

    justify-content:space-around;

    padding:12px 0;

    box-shadow:
    0 -3px 10px rgba(0,0,0,.08);
}

.bottom-nav a{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:5px;

    text-decoration:none;

    color:#888;

    font-size:.8rem;
}

.bottom-nav i{
    font-size:1.1rem;
}

.bottom-nav .active{
    color:#2563eb;
}

</style>
<link rel="stylesheet" href="/main.css" type="text/css"/>
</head>
<body>

<header class="top-bar">

    <button
    class="icon-btn"
    onclick="window.history.back()">

        <i class="fa-solid fa-arrow-left"></i>

    </button>

    <h2>ADD SALE</h2>

    <div></div>

</header>
<div class="fly_message" id="fly_message">
</div>
<div class="container">

    <form class="form-card" id="form-card" method="post">

        <div class="input-group">

            <label>
                Product Name
            </label>

            <select type="text" id="productsName" oninput="updateTotal();" name="name" required>
        </select>

        </div>

        <div class="input-group">

            <label>
                Quantity
            </label>

            <input
            type="number"
            placeholder="e.g. 5" name="qn" id="qn" oninput="updateTotal();" required/>

        </div>

        <div class="input-group">

            <label>
                Total Price (TZS)
            </label>

            <input type="number"
            placeholder="e.g. 20000" id="total" name="total" required/>

        </div>

        <div class="input-group">

            <label>
                Time
            </label>

            <div class="time-wrapper">

                <input type="text" readonly=true id="clock" name="time" required/>

                <i class="fa-regular fa-clock"></i>

            </div>

        </div>

        <button class="save-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            SAVE SALE

        </button>

    </form>

</div>

<nav class="bottom-nav">

    <a href="#">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </a>

    <a href="#" class="active">
        <i class="fa-solid fa-book"></i>
        <span>Records</span>
    </a>

    <a href="#">
        <i class="fa-solid fa-chart-column"></i>
        <span>Reports</span>
    </a>

    <a href="#">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
    </a>

</nav>
<script type="text/javascript" src="/main.js"></script>
<script type="text/javascript">
    let selector = document.getElementById('productsName');
    let store = [
        {
            "name": "Screw",
            "qn": 450,
            "unitPrice": 500,
            "unitFrom": 20,
            "sellingPrice": 1000
        },
        {
            "name": "Nuts",
            "qn": 300,
            "unitPrice": 1500,
            "unitFrom": 10,
            "sellingPrice": 3000
        },
        {
            "name": "Jack Appacus",
            "qn": 280,
            "unitPrice": 500,
            "unitFrom": 20,
            "sellingPrice": 1000
        }
    ]
    function getRecords() {
        /*
        const res = await fetch('/account/api/store');
        const data = await res.json();
        */
        for (var i=0; i<store.length; i++) {
            let option = document.createElement('option');
            option.setAttribute('value', `${store[i].name}`);
            option.innerHTML = store[i].name;
            selector.appendChild(option)
        }

    }
    getRecords()
    document.getElementById('form-card').addEventListener('submit', async(e)=>{
        let name = e.target.name.value.trim();
        let qn = e.target.qn.value;
        let total = e.target.total.value;

        alert(name);
    })

    ///=>Updating total on typing quantity
    async function updateTotal() {
        try {
        let _name = document.getElementById('productsName').value;
        let qn = Number(document.getElementById('qn').value);
        let total = document.getElementById('total');

        if (isNaN(qn)) {
            flyMSG('err', 'Data Input Error');
        }
        else {
            for (var i=0; i<store.length; i++) {
                if (store[i].name===_name) {
                    //Get unitFrom qn and chack
                    if (qn>=store[i].unitFrom) {
                        let _total = qn*store[i].unitPrice;
                        total.value = `${_total}`;
                    }
                    else {
                        let _total = qn*store[i].sellingPrice;
                        total.value = `${_total}`;
                    }
                }
            }
        }
    }
    catch (err) {
        console.log(err.message);
    }
    }
</script>
<script type="text/javascript">
    function updateClock() {

  const now = new Date();
  const hours = now.getHours().toString().padStart(2, 0);
  const minutes = now.getMinutes().toString().padStart(2, 0);
  const seconds = now.getSeconds().toString().padStart(2, 0);
  const timer = `${hours}:${minutes}:${seconds}`;
  document.getElementById('clock').value = timer;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
